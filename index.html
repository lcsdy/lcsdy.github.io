<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        /* 新增社群弹窗样式 */
        .community-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .community-popup.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .community-popup-content {
            position: relative;
            max-width: 85%;
            border-radius: 16px;
            overflow: hidden;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .community-qrcode {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.7) translateY(50px); opacity: 0; }
            60% { transform: scale(1.05) translateY(-10px); }
            80% { transform: scale(0.95); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 原有body内容保持不变 -->
    <div class="main-container">
        <div class="button-group">
            <a href="0905.jpg" class="action-btn">点击赞赏财神</a>
            <a href="https://t.me/lcsnbkls" class="action-btn" id="communityBtn">加入财神社群</a>
            <button id="copyButton" class="action-btn">点击复制公众号</button>
        </div>
    </div>

    <!-- 新增社群弹窗 -->
    <div class="community-popup" id="communityPopup">
        <div class="community-popup-content">
            <img src="community_qr.jpg" class="community-qrcode" alt="0905.jpg">
        </div>
    </div>

    <script>
        (function(){
            // 原有JavaScript逻辑完全保留

            // 新增社群弹窗控制
            const communityBtn = document.getElementById('communityBtn');
            const communityPopup = document.getElementById('communityPopup');

            // 点击社群按钮
            communityBtn.addEventListener('click', function(e) {
                e.preventDefault();
                communityPopup.classList.add('active');
            });

            // 关闭弹窗逻辑
            communityPopup.addEventListener('click', function(e) {
                if(e.target === this) {
                    this.classList.remove('active');
                }
            });
        })();
    </script>
</body>
</html>
