<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        /* 基础样式 */
        body, html { 
            margin:0; 
            padding:0; 
            height:100%; 
            overflow:hidden; 
            font-family:-apple-system, sans-serif; 
        }

        /* 视频容器 */
        #bg-video { 
            position:fixed; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            object-fit:cover; 
            z-index:-1; 
        }

        /* 主容器 */
        .main-container { 
            position:absolute; 
            top:50%; 
            left:50%; 
            transform:translate(-50%,-50%); 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            gap:35px; 
            width:90%; 
            max-width:380px; 
        }

        /* 控制按钮样式 */
        .control-btn { 
            width:90px; 
            height:90px; 
            border-radius:50%; 
            background:rgba(255,255,255,0.12); 
            border:2px solid rgba(255,255,255,0.3); 
            box-shadow:0 8px 32px rgba(0,0,0,0.3); 
            cursor:pointer; 
            transition:all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display:flex; 
            justify-content:center; 
            align-items:center;
        }

        /* 按钮交互效果 */
        .control-btn:hover { 
            transform:scale(1.08) rotate(5deg); 
            box-shadow:0 12px 40px rgba(0,0,0,0.4); 
        }

        .control-btn:active {
            transform: scale(0.95) rotate(5deg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* LOGO旋转动画 */
        #logo { 
            width:55px; 
            height:55px; 
            animation:rotate 4s linear infinite; 
            border-radius:50%; 
        }

        /* 按钮组 */
        .button-group { 
            display:flex; 
            flex-direction:column; 
            gap:18px; 
            width:100%; 
            align-items:center; 
        }

        /* 功能按钮样式 */
        .action-btn { 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            padding:15px 30px; 
            width:240px; 
            background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.12)); 
            backdrop-filter:blur(12px); 
            border:1px solid rgba(255,255,255,0.3); 
            border-radius:14px; 
            color:#fff; 
            font-size:16px; 
            transition:all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            box-shadow:0 6px 20px rgba(0,0,0,0.15);
            text-decoration: none !important;
            position: relative;
            overflow: hidden;
        }

        /* 按钮涟漪效果 */
        .action-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: width 0.3s, height 0.3s, opacity 0.3s;
        }

        .action-btn:active::after {
            width: 150px;
            height: 150px;
            opacity: 1;
        }

        .action-btn:hover { 
            transform:translateY(-3px); 
            box-shadow:0 8px 24px rgba(0,0,0,0.25); 
        }

        /* 提示框 */
        .custom-alert { 
            position:fixed; 
            top:30px; 
            left:50%; 
            transform:translateX(-50%); 
            background:rgba(40,40,40,0.95); 
            color:#fff; 
            padding:14px 28px; 
            border-radius:10px; 
            display:none; 
        }

        /* 旋转动画 */
        @keyframes rotate { 
            from{transform:rotate(0)} 
            to{transform:rotate(360deg)} 
        }

        /* 移动端适配 */
        @media (max-width:650px) { 
            .main-container{ gap:28px; max-width:300px } 
            .action-btn{ width:200px; padding:14px 25px; font-size:15px } 
            .control-btn{ width:80px; height:80px } 
            #logo{ width:50px; height:50px } 
        }

        /* 移除默认焦点效果 */
        button:focus, a:focus, .control-btn:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <video id="bg-video" loop autoplay muted playsinline>
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="main-container">
        <div class="control-btn" id="controlButton">
            <img id="logo" src="logo.gif" alt="Control">
        </div>
        <div class="button-group">
            <a href="20250501.mp4" class="action-btn">点击进入主页</a>
            <a href="http://www.douyin.com" class="action-btn">加入财神社群</a>
            <button id="copyButton" class="action-btn">点击复制公众号</button>
        </div>
    </div>

    <div class="custom-alert" id="copyAlert">公众号已复制</div>

    <script>
        (function(){
            // 视频控制核心逻辑
            const video = document.getElementById('bg-video');
            let isPlaying = true;

            // 自动播放初始化
            const initVideo = () => {
                video.play().then(() => {
                    video.muted = false;
                }).catch(() => {
                    video.muted = true;
                    video.play();
                });
            }

            // 页面加载后初始化视频
            window.addEventListener('load', initVideo);

            // 播放/暂停控制
            document.getElementById('controlButton').onclick = () => {
                if(isPlaying) {
                    video.pause();
                } else {
                    video.play();
                }
                isPlaying = !isPlaying;
                document.getElementById('logo').style.animationPlayState = isPlaying ? 'running' : 'paused';
            };

            // 声音状态同步
            video.addEventListener('play', () => {
                if(video.muted) {
                    video.muted = false;
                }
            });

            // 复制功能
            document.getElementById('copyButton').onclick = () => {
                navigator.clipboard.writeText('LIVE-CS2025').then(() => {
                    const alertBox = document.getElementById('copyAlert');
                    alertBox.style.display = 'block';
                    setTimeout(() => alertBox.style.display = 'none', 2000);
                });
            };

            // 微信环境处理
            if(/MicroMessenger/i.test(navigator.userAgent)) {
                document.body.innerHTML = `<img src="IMG_5115.jpeg" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90%;height:auto;">`;
            }
        })();
    </script>
</body>
</html>
