<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        /* 基础样式 */
        body, html { 
            margin:0; 
            padding:0; 
            height:100%; 
            overflow:hidden; 
            font-family:-apple-system, sans-serif; 
        }

        #bg-video { 
            position:fixed; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            object-fit:cover; 
            z-index:-1; 
        }

        .main-container { 
            position:absolute; 
            top:50%; 
            left:50%; 
            transform:translate(-50%,-50%); 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            gap:35px; 
            width:90%; 
            max-width:380px; 
        }

        .control-btn { 
            width:90px; 
            height:90px; 
            border-radius:50%; 
            background:rgba(255,255,255,0.12); 
            border:2px solid rgba(255,255,255,0.3); 
            box-shadow:0 8px 32px rgba(0,0,0,0.3); 
            cursor:pointer; 
            transition:all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display:flex; 
            justify-content:center; 
            align-items:center;
        }

        .control-btn:hover { 
            transform:scale(1.08) rotate(5deg); 
            box-shadow:0 12px 40px rgba(0,0,0,0.4); 
        }

        .control-btn:active {
            transform: scale(0.95) rotate(5deg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #logo { 
            width:55px; 
            height:55px; 
            animation:rotate 4s linear infinite; 
            border-radius:50%; 
        }

        .button-group { 
            display:flex; 
            flex-direction:column; 
            gap:18px; 
            width:100%; 
            align-items:center; 
        }

        .action-btn { 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            padding:15px 30px; 
            width:240px; 
            background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.12)); 
            backdrop-filter:blur(12px); 
            border:1px solid rgba(255,255,255,0.3); 
            border-radius:14px; 
            color:#fff; 
            font-size:16px; 
            transition:all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            box-shadow:0 6px 20px rgba(0,0,0,0.15);
            text-decoration: none !important;
            position: relative;
            overflow: hidden;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: width 0.3s, height 0.3s, opacity 0.3s;
        }

        .action-btn:active::after {
            width: 150px;
            height: 150px;
            opacity: 1;
        }

        .action-btn:hover { 
            transform:translateY(-3px); 
            box-shadow:0 8px 24px rgba(0,0,0,0.25); 
        }

        .custom-alert { 
            position:fixed; 
            top:30px; 
            left:50%; 
            transform:translateX(-50%); 
            background:rgba(40,40,40,0.95); 
            color:#fff; 
            padding:14px 28px; 
            border-radius:10px; 
            display:none; 
        }

        @keyframes rotate { 
            from{transform:rotate(0)} 
            to{transform:rotate(360deg)} 
        }

        @media (max-width:650px) { 
            .main-container{ gap:28px; max-width:300px } 
            .action-btn{ width:200px; padding:14px 25px; font-size:15px } 
            .control-btn{ width:80px; height:80px } 
            #logo{ width:50px; height:50px } 
        }

        button:focus, a:focus, .control-btn:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }

        /* 弹窗样式 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .popup-content {
            position: relative;
            width: 80%;
            max-width: 400px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            backdrop-filter: blur(20px);
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .popup-overlay.active .popup-content {
            transform: scale(1);
            opacity: 1;
        }

        .popup-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .close-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.8);
            font-size: 24px;
            line-height: 1;
        }

        .close-btn:hover {
            transform: rotate(90deg) scale(1.1);
            background: rgba(255,50,50,0.3);
        }

        .action-btn.popup-trigger {
            position: relative;
            overflow: visible;
        }

        .action-btn.popup-trigger::before {
            content: '✨';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 18px;
            animation: sparkle 1.5s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <video id="bg-video" loop autoplay muted playsinline>
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="main-container">
        <div class="control-btn" id="controlButton">
            <img id="logo" src="logo.gif" alt="Control">
        </div>
        <div class="button-group">
            <a href="2025cs.mp4" class="action-btn">进入财神主页</a>
            <a href="javascript:void(0)" class="action-btn popup-trigger">点击赞赏财神</a>
            <button id="copyButton" class="action-btn">点击复制公众号</button>
        </div>
    </div>

    <div class="custom-alert" id="copyAlert">公众号已复制</div>

    <!-- 弹窗结构 -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-content">
            <div class="close-btn" id="closeButton">×</div>
            <img src="0905.jpg" class="popup-image" alt="赞赏二维码">
        </div>
    </div>

    <script>
        (function(){
            // 视频控制逻辑
            const video = document.getElementById('bg-video');
            let isPlaying = true;

            const initVideo = () => {
                video.play().then(() => {
                    video.muted = false;
                }).catch(() => {
                    video.muted = true;
                    video.play();
                });
            }

            window.addEventListener('load', initVideo);

            document.getElementById('controlButton').onclick = () => {
                if(isPlaying) {
                    video.pause();
                } else {
                    video.play();
                }
                isPlaying = !isPlaying;
                document.getElementById('logo').style.animationPlayState = isPlaying ? 'running' : 'paused';
            };

            // 复制功能
            document.getElementById('copyButton').onclick = () => {
                navigator.clipboard.writeText('LIVE-CS2025').then(() => {
                    const alertBox = document.getElementById('copyAlert');
                    alertBox.style.display = 'block';
                    setTimeout(() => alertBox.style.display = 'none', 2000);
                });
            };

            // 微信环境处理
            if(/MicroMessenger/i.test(navigator.userAgent)) {
                document.body.innerHTML = `<img src="IMG_5115.jpeg" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90%;height:auto;">`;
            }

            // 弹窗控制逻辑
            const overlay = document.getElementById('popupOverlay');
            const closeBtn = document.getElementById('closeButton');

            function showPopup() {
                overlay.style.display = 'flex';
                setTimeout(() => overlay.classList.add('active'), 10);
                document.body.style.overflow = 'hidden';
            }

            function closePopup() {
                overlay.classList.remove('active');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.body.style.overflow = '';
                }, 400);
            }

            // 事件绑定
            document.querySelector('.popup-trigger').addEventListener('click', showPopup);
            closeBtn.addEventListener('click', closePopup);
            overlay.addEventListener('click', function(e) {
                if(e.target === this) closePopup();
            });

            // 移动端触摸优化
            let startY = 0;
            document.addEventListener('touchstart', e => {
                startY = e.touches[0].clientY;
            }, { passive: true });

            document.addEventListener('touchmove', e => {
                const currentY = e.touches[0].clientY;
                if (Math.abs(currentY - startY) > 10) {
                    e.preventDefault();
                }
            }, { passive: false });
        })();
    </script>
</body>
</html>
